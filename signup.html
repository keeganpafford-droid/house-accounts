<!doctype html>
<html lang="en" data-auth-page="true">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Start Free | House Accounts</title>
<meta name="description" content="Create your House Accounts beta account and monitor up to 10 existing customers for free.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/site-header.css"><link rel="stylesheet" href="/auth-pages.css">
<script src="/site-header.js" defer></script>
</head>
<body>
<div class="auth-wrap"><main class="auth-card">
  <div class="auth-brand">House Accounts</div>
  <span class="auth-offer">Start Free · No credit card required</span>
  <p class="auth-copy">Create your beta account. Monitor up to 10 companies for free.</p>
  <form id="signupForm" novalidate>
    <div class="auth-grid">
      <label class="auth-field">Name<input name="name" autocomplete="name" required><span class="auth-error"></span></label>
      <label class="auth-field">Company / Organization<input name="organizationName" autocomplete="organization" required><span class="auth-error"></span></label>
      <label class="auth-field">Role<select name="role" required><option value="">Select your role</option><option value="Owner">Owner</option><option value="Sales Manager">Sales Manager</option><option value="Sales Rep">Sales Rep</option><option value="Other">Other</option></select><span class="auth-error"></span></label>
      <label class="auth-field">Number of house accounts<input name="house_accounts" type="number" min="1" step="1" inputmode="numeric" placeholder="Example: 75" required><span class="auth-error"></span></label>
      <label class="auth-field full">CRM / ERP <span style="font-weight:500;color:#5f6f86">(optional)</span><input name="crm_erp" placeholder="Commonsku, Facilis, Antera, ESP, Excel, Other" autocomplete="off"><span class="auth-error"></span></label>
      <label class="auth-field">Work Email<input name="email" type="email" autocomplete="email" required><span class="auth-error"></span></label>
      <label class="auth-field">Password<input name="password" type="password" autocomplete="new-password" required><span class="auth-error"></span></label>
    </div>
    <button class="auth-button" id="signupSubmit" type="submit">Start Free</button>
  </form>
  <div class="auth-message" id="signupMessage" role="alert"></div>
  <div class="auth-links"><span>Already have an account? <a class="auth-link" href="/login">Log In</a></span><a class="auth-link" href="/pricing.html">View Pricing</a></div>
</main></div>
<script src="/auth-client.js"></script><script src="/signup-form.js"></script>
</body></html>
