<!doctype html>
<html lang="en" data-auth-page="true">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log In | House Accounts</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/site-header.css"><link rel="stylesheet" href="/auth-pages.css">
<script src="/site-header.js" defer></script>
</head>
<body>
<div class="auth-wrap"><main class="auth-card" style="max-width:520px">
  <div class="auth-brand">House Accounts</div>
  <p class="auth-copy">Welcome back. Log in to monitor your customers and discover new reasons to reach out.</p>
  <form id="loginForm" novalidate>
    <label class="auth-field">Work Email<input name="email" type="email" autocomplete="email" required><span class="auth-error"></span></label>
    <label class="auth-field">Password<input name="password" type="password" autocomplete="current-password" required><span class="auth-error"></span></label>
    <button class="auth-button" id="loginSubmit" type="submit">Log In</button>
  </form>
  <div class="auth-message" id="loginMessage" role="alert"></div>
  <div class="auth-links"><a class="auth-link" href="/forgot-password.html">Forgot password?</a><span>New to House Accounts? <a class="auth-link" href="/signup">Start Free</a></span></div>
</main></div>
<script src="/auth-client.js"></script>
<script>
(function(){
 const form=document.getElementById('loginForm'),submit=document.getElementById('loginSubmit'),message=document.getElementById('loginMessage');
 const next=new URLSearchParams(location.search).get('next')||'/dashboard/';
 const val=n=>{const f=form.elements.namedItem(n);return f&&typeof f.value==='string'?f.value.trim():''};
 form.addEventListener('submit',async e=>{e.preventDefault();message.className='auth-message';message.textContent='';const email=val('email').toLowerCase(),password=val('password');if(!email||!password){message.textContent='Please enter your email and password.';message.className='auth-message error';return;}submit.disabled=true;submit.textContent='Logging in…';try{await HouseAuth.api('login',{email,password});location.href=next;}catch(err){message.textContent=err.message||'Login failed.';message.className='auth-message error';}finally{submit.disabled=false;submit.textContent='Log In';}});
})();
</script>
</body></html>
