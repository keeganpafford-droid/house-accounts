<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset password | House Accounts</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#F7F8FA;color:#17375E}.wrap{min-height:100vh;display:grid;place-items:center;padding:32px}.card{width:min(500px,100%);background:#fff;border:1px solid #D8DEE9;border-radius:18px;padding:30px}h1{margin:0 0 8px}p{color:#5f6f86}input{width:100%;height:46px;border:1px solid #D8DEE9;border-radius:12px;padding:0 14px;margin-top:8px}.btn{width:100%;height:48px;border:0;border-radius:12px;background:#F5A623;font-weight:900;margin-top:18px}.msg{display:none;margin-top:14px;padding:12px;border-radius:12px}.ok{background:#edfdfb;color:#0f766e}.err{background:#fdecea;color:#8a1f11}</style></head><body><div class="wrap"><main class="card"><h1>Reset your password</h1><p>Enter your email and we’ll send a reset link.</p><form id="f"><input id="email" type="email" placeholder="you@company.com" required><button class="btn">Send reset link</button></form><div id="m" class="msg"></div><p><a href="/login.html">Back to log in</a></p></main></div><script src="/auth-client.js"></script><script>f.onsubmit=async e=>{e.preventDefault();m.style.display='none';try{await HouseAuth.api('recover',{email:email.value.trim().toLowerCase()});m.textContent='Check your email for a reset link.';m.className='msg ok';}catch(err){m.textContent=err.message;m.className='msg err';}m.style.display='block'};</script></body></html>
