<!doctype html><html lang="en" data-protected="true"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings | House Accounts</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>:root{--navy:#17375E;--teal:#1FB7AE;--gold:#F5A623;--bg:#F7F8FA;--line:#D8DEE9;--muted:#5f6f86}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--navy)}header{background:#fff;border-bottom:1px solid var(--line);padding:18px 28px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:900;color:var(--navy);text-decoration:none}.wrap{max-width:900px;margin:0 auto;padding:36px 24px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 12px 32px rgba(23,55,94,.06)}h1{margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:20px}.item{border:1px solid var(--line);border-radius:14px;padding:14px}.label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}.value{font-size:18px;font-weight:900;margin-top:6px}.usage{height:10px;background:#edf0f5;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:var(--teal)}.btn{display:inline-flex;margin-top:18px;background:var(--gold);border-radius:12px;padding:12px 18px;color:#1f2937;font-weight:900;text-decoration:none}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><header><a class="brand" href="/">House Accounts</a><nav><a href="/prospects/">Prospects</a></nav></header><main class="wrap"><h1>Account Settings</h1><p id="intro">Your House Accounts beta workspace.</p><section class="card"><div class="grid" id="settingsGrid"></div><a class="btn" href="/pricing.html">Upgrade Plan →</a></section></main><script src="/auth-client.js"></script><script>
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dt(v){if(!v)return '—'; const d=new Date(v); return Number.isFinite(d.getTime())?d.toLocaleDateString(): '—'}
async function load(){await HouseAuth.requireAuth(); const res=await fetch('/api/settings',{headers:HouseAuth.authHeaders()}); const data=await res.json(); if(!res.ok) throw new Error(data.error||'Unable to load settings'); const u=data.user||{}, org=data.organization||{}, usage=data.usage||{}; const pct=Math.min(100,Math.round((usage.totalMonitoredCompanies||0)/Math.max(1,usage.freeCompanyLimit||10)*100)); settingsGrid.innerHTML=[['Name',u.name||'—'],['Email',u.email||'—'],['Organization',org.name||u.company||'—'],['Plan',org.plan||'free'],['Seat limit',org.seat_limit||1],['Member since',dt(u.created_at)],['Monitored companies',`${usage.totalMonitoredCompanies||0} / ${usage.freeCompanyLimit||10}`],['Account role',u.app_role||'owner']].map(([l,v])=>`<div class="item"><div class="label">${esc(l)}</div><div class="value">${esc(v)}</div>${l==='Monitored companies'?`<div class="usage"><div class="fill" style="width:${pct}%"></div></div>`:''}</div>`).join('');}
load().catch(e=>{settingsGrid.innerHTML='<div class="item"><div class="value">'+esc(e.message)+'</div></div>'});
</script></body></html>
