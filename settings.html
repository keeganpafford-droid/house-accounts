<!doctype html><html lang="en" data-protected="true"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings | House Accounts</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>:root{--navy:#17375E;--teal:#1FB7AE;--gold:#F5A623;--bg:#F7F8FA;--line:#D8DEE9;--muted:#5f6f86}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--navy)}header{background:#fff;border-bottom:1px solid var(--line);padding:18px 28px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:900;color:var(--navy);text-decoration:none}.wrap{max-width:900px;margin:0 auto;padding:36px 24px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 12px 32px rgba(23,55,94,.06)}h1{margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:20px}.item{border:1px solid var(--line);border-radius:14px;padding:14px}.label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}.value{font-size:18px;font-weight:900;margin-top:6px}.usage{height:10px;background:#edf0f5;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:var(--teal)}.btn{display:inline-flex;margin-top:18px;background:var(--gold);border-radius:12px;padding:12px 18px;color:#1f2937;font-weight:900;text-decoration:none;border:0;cursor:pointer}.btn[disabled]{opacity:.65;cursor:not-allowed}.team-section{margin-top:22px}.team-list{display:grid;gap:10px;margin-top:14px}.team-row{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}.team-row strong{display:block}.team-row span{color:var(--muted);font-size:13px}.invite-form{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:14px}input{height:44px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:15px}.notice{margin-top:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#F7F8FA;color:var(--navy);font-weight:700}.notice.error{background:#fdecea;border-color:#f6c6bd;color:#8a1f11}@media(max-width:700px){.grid{grid-template-columns:1fr}.invite-form{grid-template-columns:1fr}.team-row{display:block}}</style></head><body><header><a class="brand" href="/dashboard/">House Accounts</a><nav><a href="/prospects/">Prospects</a></nav></header><main class="wrap"><h1>Account Settings</h1><p id="intro">Your House Accounts beta workspace.</p><section class="card"><div class="grid" id="settingsGrid"></div><a class="btn" href="/pricing.html">Upgrade Plan →</a></section><section class="card team-section"><h2>Team</h2><p id="teamIntro">Invite teammates to join your organization.</p><div class="grid"><div class="item"><div class="label">Seats used</div><div class="value" id="teamSeats">—</div></div><div class="item"><div class="label">Pending invites</div><div class="value" id="pendingInvitesCount">—</div></div></div><h3 style="margin-top:20px;">Current users</h3><div class="team-list" id="teamUsers"></div><h3 style="margin-top:20px;">Pending invitations</h3><div class="team-list" id="pendingInvites"></div><form class="invite-form" id="inviteForm"><input id="inviteEmail" type="email" placeholder="teammate@company.com" autocomplete="email" required><button class="btn" id="inviteBtn" type="submit" style="margin-top:0;">Invite teammate</button></form><div id="inviteNotice" class="notice" style="display:none;"></div></section></main><script src="/auth-client.js"></script><script>
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dt(v){if(!v)return '—'; const d=new Date(v); return Number.isFinite(d.getTime())?d.toLocaleDateString(): '—'}
async function load(){await HouseAuth.requireAuth(); const res=await fetch('/api/settings',{headers:HouseAuth.authHeaders()}); const data=await res.json(); if(!res.ok) throw new Error(data.error||'Unable to load settings'); const u=data.user||{}, org=data.organization||{}, usage=data.usage||{}; const limited=usage.isLimitedPlan!==undefined?!!usage.isLimitedPlan:String(org.plan||'free').toLowerCase()==='free'; const limit=usage.companyLimit||usage.freeCompanyLimit||10; const pct=limited?Math.min(100,Math.round((usage.totalMonitoredCompanies||0)/Math.max(1,limit)*100)):100; const usageLabel=limited?`${usage.totalMonitoredCompanies||0} / ${limit} companies monitored`:`${usage.totalMonitoredCompanies||0} companies monitored`; const plan=String(org.plan||'free').toLowerCase(); const seatLimit=plan==='enterprise'?'Custom':(org.seat_limit||1); const trialLabel=usage.trialExpired?'Expired':(usage.trialActive?'Active':(org.trial_status||'inactive')); const trialDays=usage.trialDaysRemaining==null?'—':`${usage.trialDaysRemaining} days remaining`; const trialUsed=usage.trialUsed||org.trial_used?'Yes':'No'; const trialStarted=usage.trialStartedAt||org.trial_started_at; const seatsUsed=usage.seatsUsed||1; settingsGrid.innerHTML=[['Name',u.name||'—'],['Email',u.email||'—'],['Organization',org.name||u.company||'—'],['Plan',plan],['Trial status',trialLabel],['Trial used',trialUsed],['Trial started',trialStarted?dt(trialStarted):'—'],['Trial end',org.trial_end?dt(org.trial_end):'—'],['Trial remaining',trialDays],['Seats used',`${seatsUsed} / ${seatLimit}`],['Seat limit',seatLimit],['Member since',dt(u.created_at)],['Monitored companies',usageLabel],['Account role',u.app_role||'owner']].map(([l,v])=>`<div class="item"><div class="label">${esc(l)}</div><div class="value">${esc(v)}</div>${l==='Monitored companies'?`<div class="usage"><div class="fill" style="width:${pct}%"></div></div>`:''}</div>`).join(''); await loadTeam();}
function showInviteNotice(msg,isError=false){inviteNotice.textContent=msg; inviteNotice.className='notice'+(isError?' error':''); inviteNotice.style.display='block';}
async function loadTeam(){try{const res=await fetch('/api/team?action=list',{headers:HouseAuth.authHeaders()}); const data=await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error||'Unable to load team.'); const limit=data.seatLimit==null?'Custom':data.seatLimit; teamSeats.textContent=`${data.seatsUsed||0} / ${limit}`; pendingInvitesCount.textContent=data.pendingInviteCount||0; teamUsers.innerHTML=(data.users||[]).map(u=>`<div class="team-row"><div><strong>${esc(u.name||u.email)}</strong><span>${esc(u.email||'')}</span></div><span>${esc(u.app_role||u.role||'member')}</span></div>`).join('')||'<div class="team-row"><span>No users found.</span></div>'; pendingInvites.innerHTML=(data.pendingInvitations||[]).map(i=>`<div class="team-row"><div><strong>${esc(i.email)}</strong><span>Expires ${esc(dt(i.expires_at))}</span></div><span>${esc(i.role||'member')}</span></div>`).join('')||'<div class="team-row"><span>No pending invitations.</span></div>';}catch(e){teamIntro.textContent=e.message||'Unable to load team management.';}}
inviteForm.addEventListener('submit', async e=>{e.preventDefault(); inviteNotice.style.display='none'; const email=inviteEmail.value.trim(); if(!email){showInviteNotice('Email is required.',true); return;} inviteBtn.disabled=true; inviteBtn.textContent='Sending...'; try{const res=await fetch('/api/team',{method:'POST',headers:HouseAuth.authHeaders({'Content-Type':'application/json'}),body:JSON.stringify({action:'invite',email,role:'member'})}); const data=await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error||'Could not send invite.'); inviteEmail.value=''; showInviteNotice('Invitation sent.'); await loadTeam();}catch(err){showInviteNotice(err.message||'Could not send invite.',true);}finally{inviteBtn.disabled=false; inviteBtn.textContent='Invite teammate';}});
load().catch(e=>{settingsGrid.innerHTML='<div class="item"><div class="value">'+esc(e.message)+'</div></div>'});
</script></body></html>
