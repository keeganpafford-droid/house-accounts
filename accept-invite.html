<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Accept Invite | House Accounts</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>:root{--navy:#17375E;--teal:#1FB7AE;--gold:#F5A623;--bg:#F7F8FA;--line:#D8DEE9;--muted:#5f6f86}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--navy)}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}.card{width:min(520px,100%);background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 14px 40px rgba(23,55,94,.08)}.brand{font-weight:900;margin-bottom:18px}h1{margin:0 0 8px;font-size:30px}.muted{color:var(--muted);line-height:1.5}.field{margin-top:16px}label{display:block;font-size:13px;font-weight:900;margin-bottom:7px}input{width:100%;height:46px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:15px}input[readonly]{background:#F7F8FA;color:#5f6f86}.btn{width:100%;height:48px;border:0;border-radius:12px;background:var(--gold);color:#1f2937;font-weight:900;margin-top:20px;cursor:pointer}.notice{margin-top:14px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#F7F8FA;font-weight:700}.error{background:#fdecea;border-color:#f6c6bd;color:#8a1f11}.success{background:#e8fbf8;border-color:#b7eee8;color:#0f6d66}</style></head><body><main class="wrap"><section class="card"><div class="brand">House Accounts</div><h1>Accept your invitation</h1><p class="muted" id="inviteIntro">Loading invitation...</p><form id="acceptForm" style="display:none;"><div class="field"><label>Email</label><input id="email" type="email" readonly></div><div class="field"><label>Name</label><input id="name" type="text" autocomplete="name" required></div><div class="field"><label>Password</label><input id="password" type="password" autocomplete="new-password" required></div><button class="btn" id="acceptBtn" type="submit">Join House Accounts</button></form><div id="notice" class="notice" style="display:none;"></div></section></main><script>
const params=new URLSearchParams(location.search); const token=params.get('token')||''; const notice=document.getElementById('notice'); const intro=document.getElementById('inviteIntro'); const form=document.getElementById('acceptForm'); const emailInput=document.getElementById('email');
function show(msg,type=''){notice.textContent=msg; notice.className='notice '+type; notice.style.display='block';}
function saveAuth(data){if(data.session)localStorage.setItem('haAuthSession',JSON.stringify(data.session)); if(data.user)localStorage.setItem('haAuthUser',JSON.stringify(data.user));}
async function load(){if(!token){show('Invitation token is missing.','error'); return;} try{const res=await fetch('/api/team?action=validate-invite&token='+encodeURIComponent(token)); const data=await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error||'Invitation is invalid.'); intro.textContent=`You’re joining ${data.organization?.name||'this organization'} on House Accounts.`; emailInput.value=data.invitation?.email||''; form.style.display='block';}catch(e){show(e.message||'Invitation could not be loaded.','error');}}
form.addEventListener('submit', async e=>{e.preventDefault(); notice.style.display='none'; const name=document.getElementById('name').value.trim(); const password=document.getElementById('password').value.trim(); if(!name||!password){show('Name and password are required.','error'); return;} acceptBtn.disabled=true; acceptBtn.textContent='Creating account...'; try{const res=await fetch('/api/team',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'accept-invite',token,name,password})}); const data=await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error||'Could not accept invitation.'); saveAuth(data); show('Invitation accepted. Redirecting...','success'); setTimeout(()=>location.href='/dashboard/?joined=1',500);}catch(err){show(err.message||'Could not accept invitation.','error');}finally{acceptBtn.disabled=false; acceptBtn.textContent='Join House Accounts';}});
load();
</script></body></html>
