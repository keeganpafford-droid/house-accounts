<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Choose new password | House Accounts</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#F7F8FA;color:#17375E}.wrap{min-height:100vh;display:grid;place-items:center;padding:32px}.card{width:min(500px,100%);background:#fff;border:1px solid #D8DEE9;border-radius:18px;padding:30px}input{width:100%;height:46px;border:1px solid #D8DEE9;border-radius:12px;padding:0 14px;margin-top:8px}.btn{width:100%;height:48px;border:0;border-radius:12px;background:#F5A623;font-weight:900;margin-top:18px}.msg{display:none;margin-top:14px;padding:12px;border-radius:12px}.err{background:#fdecea;color:#8a1f11}.ok{background:#edfdfb;color:#0f766e}</style></head><body><div class="wrap"><main class="card"><h1>Choose a new password</h1><form id="f"><input id="password" type="password" placeholder="New password" required minlength="8"><button class="btn">Update password</button></form><div id="m" class="msg"></div></main></div><script src="/auth-client.js"></script><script>
function hashParams(){const h=new URLSearchParams(location.hash.replace(/^#/,'')); return {access_token:h.get('access_token'),refresh_token:h.get('refresh_token')};}
f.onsubmit=async e=>{e.preventDefault();m.style.display='none';try{const hp=hashParams(); if(hp.access_token)localStorage.setItem('haAuthSession',JSON.stringify({access_token:hp.access_token,refresh_token:hp.refresh_token})); await HouseAuth.api('update-password',{password:password.value});m.textContent='Password updated. Redirecting...';m.className='msg ok';setTimeout(()=>location.href='/',900);}catch(err){m.textContent=err.message;m.className='msg err';}m.style.display='block'};
</script></body></html>
